<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480"
     font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="11">

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
    </style>
    <pattern id="bins" x="0" y="0" width="6" height="8" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#ddd" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Card background -->
  <rect width="960" height="480" fill="#fafafa" rx="8"/>
  <rect x="20" y="20" width="920" height="440" fill="white" rx="6" stroke="#e8e8e8" stroke-width="1"/>

  <!-- Section labels -->
  <text x="38" y="44" font-size="11" font-weight="600" fill="#aaa" letter-spacing="1">DISCRETE</text>
  <text x="38" y="254" font-size="11" font-weight="600" fill="#aaa" letter-spacing="1">CONTINUOUS  ANALOGUE</text>

  <!-- Separator line -->
  <line x1="35" y1="245" x2="925" y2="245" stroke="#eee" stroke-width="1.5"/>

  <!-- ==================== TOP: DISCRETE ==================== -->

  <line x1="55" y1="148" x2="925" y2="148" stroke="#444" stroke-width="1.5"/>
  <g stroke="#555" stroke-width="1">
    <line x1="55"  y1="144" x2="55"  y2="152"/>
    <line x1="200" y1="144" x2="200" y2="152"/>
    <line x1="345" y1="144" x2="345" y2="152"/>
    <line x1="490" y1="144" x2="490" y2="152"/>
    <line x1="635" y1="144" x2="635" y2="152"/>
    <line x1="780" y1="144" x2="780" y2="152"/>
    <line x1="925" y1="144" x2="925" y2="152"/>
  </g>
  <g fill="#555" text-anchor="middle" font-size="10.5">
    <text x="55"  y="163">0</text>
    <text x="200" y="163">25</text>
    <text x="345" y="163">50</text>
    <text x="490" y="163">75</text>
    <text x="635" y="163">100</text>
    <text x="780" y="163">125</text>
    <text x="925" y="163">150</text>
  </g>
  <rect x="55" y="144" width="870" height="8" fill="url(#bins)"/>

  <!-- Red dots -->
  <g fill="#e63946" stroke="white" stroke-width="1">
    <circle cx="188" cy="148" r="5.5"/>
    <circle cx="293" cy="148" r="5.5"/>
    <circle cx="420" cy="148" r="5.5"/>
    <circle cx="532" cy="148" r="5.5"/>
    <circle cx="618" cy="148" r="5.5"/>
    <circle cx="739" cy="148" r="5.5"/>
    <circle cx="867" cy="148" r="5.5"/>
  </g>

  <!-- Geometric arrow -->
  <line x1="55" y1="108" x2="181" y2="108" stroke="#2176ae" stroke-width="2"/>
  <polygon points="181,104 181,112 190,108" fill="#2176ae"/>
  <line x1="55"  y1="108" x2="55"  y2="140" stroke="#2176ae" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="188" y1="108" x2="188" y2="140" stroke="#2176ae" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="121" y="99" fill="#2176ae" text-anchor="middle" font-size="11.5" font-weight="600">Geometric(p)</text>
  <text x="121" y="122" fill="#2176ae" text-anchor="middle" font-size="10" font-style="italic">X = 23</text>

  <!-- Neg. Binomial arrow -->
  <line x1="55" y1="73" x2="611" y2="73" stroke="#f4a261" stroke-width="2"/>
  <polygon points="611,69 611,77 620,73" fill="#f4a261"/>
  <line x1="55"  y1="73" x2="55"  y2="108" stroke="#f4a261" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="618" y1="73" x2="618" y2="140" stroke="#f4a261" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <g stroke="#f4a261" stroke-width="2">
    <line x1="188" y1="69" x2="188" y2="77"/>
    <line x1="293" y1="69" x2="293" y2="77"/>
    <line x1="420" y1="69" x2="420" y2="77"/>
    <line x1="532" y1="69" x2="532" y2="77"/>
    <line x1="618" y1="69" x2="618" y2="77"/>
  </g>
  <text x="336" y="63" fill="#e07a30" text-anchor="middle" font-size="11.5" font-weight="600">Neg. Binomial(r=5, p)</text>
  <text x="336" y="86" fill="#e07a30" text-anchor="middle" font-size="10" font-style="italic">X = 97  (5th success)</text>

  <!-- Binomial bracket -->
  <line x1="55"  y1="156" x2="55"  y2="190" stroke="#2a9d5c" stroke-width="2"/>
  <line x1="55"  y1="190" x2="80"  y2="190" stroke="#2a9d5c" stroke-width="2"/>
  <line x1="925" y1="156" x2="925" y2="190" stroke="#2a9d5c" stroke-width="2"/>
  <line x1="925" y1="190" x2="900" y2="190" stroke="#2a9d5c" stroke-width="2"/>
  <line x1="80"  y1="190" x2="900" y2="190" stroke="#2a9d5c" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="490" y="207" fill="#2a9d5c" text-anchor="middle" font-size="11.5" font-weight="600">Binomial(n=150, p=1/20)</text>
  <text x="490" y="221" fill="#2a9d5c" text-anchor="middle" font-size="10" font-style="italic">Count of ● in [0,150] = 7</text>

  <!-- ==================== BOTTOM: CONTINUOUS ==================== -->

  <line x1="55" y1="350" x2="925" y2="350" stroke="#444" stroke-width="1.5"/>
  <g stroke="#555" stroke-width="1">
    <line x1="55"  y1="346" x2="55"  y2="354"/>
    <line x1="200" y1="346" x2="200" y2="354"/>
    <line x1="345" y1="346" x2="345" y2="354"/>
    <line x1="490" y1="346" x2="490" y2="354"/>
    <line x1="635" y1="346" x2="635" y2="354"/>
    <line x1="780" y1="346" x2="780" y2="354"/>
    <line x1="925" y1="346" x2="925" y2="354"/>
  </g>
  <g fill="#555" text-anchor="middle" font-size="10.5">
    <text x="55"  y="365">0</text>
    <text x="200" y="365">25</text>
    <text x="345" y="365">50</text>
    <text x="490" y="365">75</text>
    <text x="635" y="365">100</text>
    <text x="780" y="365">125</text>
    <text x="925" y="365">150</text>
  </g>

  <!-- Event lines (same positions, continuous axis — no bin marks) -->
  <g stroke="#e63946" stroke-width="1.5" opacity="0.5">
    <line x1="188" y1="290" x2="188" y2="350"/>
    <line x1="293" y1="290" x2="293" y2="350"/>
    <line x1="420" y1="290" x2="420" y2="350"/>
    <line x1="532" y1="290" x2="532" y2="350"/>
    <line x1="618" y1="290" x2="618" y2="350"/>
    <line x1="739" y1="290" x2="739" y2="350"/>
    <line x1="867" y1="290" x2="867" y2="350"/>
  </g>
  <!-- Event dots on continuous axis -->
  <g fill="#e63946" stroke="white" stroke-width="1">
    <circle cx="188" cy="350" r="5.5"/>
    <circle cx="293" cy="350" r="5.5"/>
    <circle cx="420" cy="350" r="5.5"/>
    <circle cx="532" cy="350" r="5.5"/>
    <circle cx="618" cy="350" r="5.5"/>
    <circle cx="739" cy="350" r="5.5"/>
    <circle cx="867" cy="350" r="5.5"/>
  </g>

  <!-- Exponential arrow -->
  <line x1="55" y1="310" x2="181" y2="310" stroke="#2176ae" stroke-width="2"/>
  <polygon points="181,306 181,314 190,310" fill="#2176ae"/>
  <line x1="55"  y1="310" x2="55"  y2="342" stroke="#2176ae" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="188" y1="310" x2="188" y2="342" stroke="#2176ae" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="121" y="301" fill="#2176ae" text-anchor="middle" font-size="11.5" font-weight="600">Exponential(λ)</text>
  <text x="121" y="323" fill="#2176ae" text-anchor="middle" font-size="10" font-style="italic">T = 23</text>

  <!-- Gamma arrow -->
  <line x1="55" y1="275" x2="611" y2="275" stroke="#f4a261" stroke-width="2"/>
  <polygon points="611,271 611,279 620,275" fill="#f4a261"/>
  <line x1="55"  y1="275" x2="55"  y2="310" stroke="#f4a261" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="618" y1="275" x2="618" y2="342" stroke="#f4a261" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <g stroke="#f4a261" stroke-width="2">
    <line x1="188" y1="271" x2="188" y2="279"/>
    <line x1="293" y1="271" x2="293" y2="279"/>
    <line x1="420" y1="271" x2="420" y2="279"/>
    <line x1="532" y1="271" x2="532" y2="279"/>
    <line x1="618" y1="271" x2="618" y2="279"/>
  </g>
  <text x="336" y="265" fill="#e07a30" text-anchor="middle" font-size="11.5" font-weight="600">Gamma(r=5, λ)</text>
  <text x="336" y="288" fill="#e07a30" text-anchor="middle" font-size="10" font-style="italic">T = 97  (5th event)</text>

  <!-- Poisson bracket -->
  <line x1="55"  y1="358" x2="55"  y2="392" stroke="#2a9d5c" stroke-width="2"/>
  <line x1="55"  y1="392" x2="80"  y2="392" stroke="#2a9d5c" stroke-width="2"/>
  <line x1="925" y1="358" x2="925" y2="392" stroke="#2a9d5c" stroke-width="2"/>
  <line x1="925" y1="392" x2="900" y2="392" stroke="#2a9d5c" stroke-width="2"/>
  <line x1="80"  y1="392" x2="900" y2="392" stroke="#2a9d5c" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="490" y="409" fill="#2a9d5c" text-anchor="middle" font-size="11.5" font-weight="600">Poisson(λ · 150)</text>
  <text x="490" y="423" fill="#2a9d5c" text-anchor="middle" font-size="10" font-style="italic">Count of events in [0, 150] = 7</text>

  <!-- Legend -->
  <text x="490" y="450" fill="#999" text-anchor="middle" font-size="10">
    p = λ·dx = 1/20  ·  event positions identical in both rows
  </text>

</svg>
